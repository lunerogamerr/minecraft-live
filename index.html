<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Live Control</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: 'Courier New', monospace; text-align: center; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #3c3c3c; border: 5px solid #000; padding: 20px; width: 90%; max-width: 400px; box-shadow: 10px 10px 0px #222; }
        h1 { color: #55FF55; text-shadow: 2px 2px #000; font-size: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 3px solid #000; background: #bdbdbd; box-sizing: border-box; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; max-height: 300px; overflow-y: auto; padding-right: 5px; }
        button { border: 3px solid #000; padding: 10px; font-weight: bold; cursor: pointer; font-family: inherit; }
        .btn-log { background: #54fb54; width: 48%; }
        .btn-reg { background: #4a90e2; width: 48%; color: #fff; }
        .btn-acc { background: #444; color: #fff; font-size: 11px; }
        .btn-tnt { background: #ff5555 !important; color: #fff; }
        .stats { font-size: 24px; color: #FFFF55; margin: 10px 0; }
        .cat { grid-column: span 2; color: #55FF55; font-size: 10px; border-bottom: 1px solid #555; text-align: left; margin-top: 10px; }
        #game-section { display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>MINECRAFT LIVE</h1>
        <div id="login-section">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Contraseña">
            <div style="display: flex; justify-content: space-between;">
                <button class="btn-log" onclick="login()">ENTRAR</button>
                <button class="btn-reg" onclick="register()">UNIRSE</button>
            </div>
        </div>
        <div id="game-section">
            <div class="stats">⭐ <span id="puntos">0</span></div>
            <p style="font-size: 10px;">NUEVOS PUNTOS EN: <span id="timer">03:00</span></p>
            <div class="grid">
                <div class="cat">MOBS</div>
                <button class="btn-acc" onclick="canjear('zombie', 20)">Zombie (20)</button>
                <button class="btn-acc" onclick="canjear('creeper', 70)">Creeper (70)</button>
                <button class="btn-acc" onclick="canjear('esqueleto', 30)">Esqueleto (30)</button>
                <button class="btn-acc" onclick="canjear('enderman', 100)">Enderman (100)</button>
                <div class="cat">ITEMS</div>
                <button class="btn-acc" onclick="canjear('pan', 10)">Pan (10)</button>
                <button class="btn-acc" onclick="canjear('diamante', 350)">Diamante (350)</button>
                <button class="btn-acc" onclick="canjear('notch', 2000)">M. Notch (2000)</button>
                <div class="cat">CAOS</div>
                <button class="btn-acc btn-tnt" onclick="canjear('tnt', 120)">TNT (120)</button>
                <button class="btn-acc btn-tnt" onclick="canjear('tnt10', 1500)">10 TNT (1500)</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN (Cambia URL_PLUGIN cada vez que abras Ngrok)
        const URL_PLUGIN = "https://TU-URL-DE-NGROK.ngrok-free.app"; 
        const NICK = "PrepPankaque7291";

        const firebaseConfig = {
            apiKey: "AIzaSyBpchWlSf24b_KzkmOYWqBJtpsfc8wA5pM",
            authDomain: "minecraft-stream-points.firebaseapp.com",
            projectId: "minecraft-stream-points",
            storageBucket: "minecraft-stream-points.firebasestorage.app",
            messagingSenderId: "112471241536",
            appId: "1:112471241536:web:02f66e6e6d0958d6a5c0a5"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('game-section').style.display = 'block';
                iniciarSistema(user.uid);
            }
        });

        async function canjear(tipo, coste) {
            const user = auth.currentUser;
            const doc = await db.collection("usuarios").doc(user.uid).get();
            const pts = doc.data().puntos || 0;

            if (pts >= coste) {
                // FETCH ESPECIAL PARA EVITAR BLOQUEOS EN MÓVIL
                fetch(`${URL_PLUGIN}/accion?player=${NICK}&tipo=${tipo}`, {
                    method: 'GET',
                    mode: 'no-cors',
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });

                await db.collection("usuarios").doc(user.uid).update({
                    puntos: firebase.firestore.FieldValue.increment(-coste)
                });
            } else { alert("¡Faltan puntos!"); }
        }

        function iniciarSistema(uid) {
            db.collection("usuarios").doc(uid).onSnapshot(doc => {
                document.getElementById('puntos').innerText = doc.data()?.puntos || 0;
            });
            let t = 180;
            setInterval(() => {
                t--;
                let m = Math.floor(t/60), s = t%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
                if(t <= 0) { 
                    t = 180; 
                    db.collection("usuarios").doc(uid).update({puntos: firebase.firestore.FieldValue.increment(10)});
                }
            }, 1000);
        }

        function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value); }
        function register() { auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value); }
    </script>
</body>
</html>
